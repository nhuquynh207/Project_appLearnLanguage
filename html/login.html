<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div id="header">
            <h3 id="titleApp">VocabApp</h3>
            <div>
                <a id="btn_login" class="btn_blue" href="./login.html">Login</a>
                <a id="btn_register" class="btn_green" href="./register.html">Register</a>
            </div>
        </div>
    </header>

    <section class="Inputform">
        <form action="" id="loginForm" class="form">
            <h3>Login</h3>
            <div class="formCard">

                <div class="form_item">
                    <label for="">Email</label>
                    <input type="email" id="input_emailLogin" required>
                    <small id="emailError" class="error"></small>
                </div>
                
                <div class="form_item">
                    <label for="">Password</label>
                    <input type="password" id="input_passwordLogin" required>
                    <small id="passwordError" class="error"></small>
                </div>
                
                <button class="btn_blue" id="btn_login">Login</button>
            </div>
        </form>
    </section>
    <script src="../JS/login.js"></script>
</body>
</html>
